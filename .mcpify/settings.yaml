publication:
  license: MIT
  repository: https://github.com/guercheLE/topdesk-mcp-rs
  readme: README.md
  authors:
  - Luciano Evaristo Guerche (Gorše)
  keywords:
  - mcp
  - topdesk
  - cli
  - api
  categories:
  - command-line-utilities
  - api-bindings
  exclude:
  - /.github
  - /.mcpify
  - /docs
  - /scripts
  - /openapi
  - /Dockerfile
  - /docker-compose.yml
  - /.dockerignore
  - /.env.example
  - /mcpify.yaml
default_headers:
- name: User-Agent
  value: mcpify-client/0.1.0 (generated by mcpify)
package_size_limit_bytes: 104857600
