name: Docker Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: false
          tags: topdesk-mcp:ci
