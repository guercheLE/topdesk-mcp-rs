language: rust
output: .
force: true
publish_registry: true
publication:
  license: MIT
  repository: https://github.com/guercheLE/topdesk-mcp-rs
  readme: README.md
  authors:
  - Luciano Evaristo Guerche (Gorše)
  keywords:
  - mcp
  - topdesk
  - cli
  - api
  categories:
  - command-line-utilities
  - api-bindings
  exclude:
  - /.github
  - /.mcpify
  - /docs
  - /scripts
  - /openapi
  - /Dockerfile
  - /docker-compose.yml
  - /.dockerignore
  - /.env.example
  - /mcpify.yaml
default_headers: {}
auth:
- name: BasicAuth
  kind: basic
  location: null
  parameter_name: null
versions:
- version: general-1.2.0
  source: https://developers.topdesk.com/swagger/general_specification_1.2.0.yaml
  default: true
  preprocess: []
- version: incident-4.2.6
  source: https://developers.topdesk.com/swagger/incident_specification_4.2.6.yaml
  default: false
  preprocess: []
- version: knowledge-base-before-explorer-migration
  source: https://developers.topdesk.com/swagger/knowledge-base_before_explorer_migration.json
  default: false
  preprocess: []
- version: knowledge-base-after-explorer-migration
  source: https://developers.topdesk.com/swagger/knowledge-base_after_explorer_migration.json
  default: false
  preprocess: []
- version: knowledgebase-graphql-1.0.0
  source: https://developers.topdesk.com/swagger/knowledgebase-graphql_specification_1.0.0.yaml
  default: false
  preprocess: []
- version: reservations-2.0.0
  source: https://developers.topdesk.com/swagger/reservations_specification_2.0.0.json
  default: false
  preprocess: []
- version: services-1.3.7
  source: https://developers.topdesk.com/swagger/services_specification_1.3.7.yaml
  default: false
  preprocess: []
- version: change-1.4.0
  source: https://developers.topdesk.com/swagger/change_specification_1.4.0.yaml
  default: false
  preprocess: []
- version: assets-1.91.1
  source: https://developers.topdesk.com/swagger/assets_specification_1.91.1.json
  default: false
  preprocess: []
- version: operations-management-1.10.0
  source: https://developers.topdesk.com/swagger/operations-management_specification_1.10.0.yaml
  default: false
  preprocess: []
- version: visitors-2.0.0
  source: https://developers.topdesk.com/swagger/visitors_specification_2.0.0.json
  default: false
  preprocess: []
- version: supporting-files-2.7.11
  source: https://developers.topdesk.com/swagger/supporting-files_specification_2.7.11.yaml
  default: false
  preprocess: []
- version: access-roles-saas
  source: https://developers.topdesk.com/swagger/access-roles_SaaS.json
  default: false
  preprocess: []
- version: access-roles-va-release-1-2026
  source: https://developers.topdesk.com/swagger/access-roles_VA-2026-1.json
  default: false
  preprocess: []
- version: lookandfeel-1.0.0
  source: https://developers.topdesk.com/swagger/lookandfeel_specification_1.0.0.json
  default: false
  preprocess: []
- version: task-notifications-1.0.0
  source: https://developers.topdesk.com/swagger/task-notifications_specification_1.0.0.yaml
  default: false
  preprocess: []
- version: settings-1.1.0
  source: https://developers.topdesk.com/swagger/settings_specification_1.1.0.yaml
  default: false
  preprocess: []
- version: custom-action-support-saas
  source: https://developers.topdesk.com/swagger/custom-action-support_SaaS.json
  default: false
  preprocess: []
- version: custom-action-support-va-release-1-2023-or-newer
  source: https://developers.topdesk.com/swagger/custom-action-support_VA-2023-plus.json
  default: false
  preprocess: []
version_policy:
  mode: all
package_size_limit_mb: 100
